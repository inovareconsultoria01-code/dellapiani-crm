<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dellapiani CRM</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <h1>Dellapiani CRM</h1>
      <p>Gestão de clientes, funil e WhatsApp</p>
      <input id="loginUser" placeholder="Usuário" value="admin"/>
      <input id="loginPass" type="password" placeholder="Senha" value="1234"/>
      <button onclick="login()">Entrar</button>
      <small>Usuário: admin | Senha: 1234</small>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <h2>Dellapiani</h2>
      <button onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('clientes')">Clientes</button>
      <button onclick="showPage('funil')">Funil de Vendas</button>
      <button onclick="showPage('vendedores')">Vendedores</button>
      <button onclick="logout()">Sair</button>
    </aside>

    <main class="main">
      <section id="dashboard" class="page">
        <h1>Dashboard</h1>
        <div class="cards">
          <div class="card"><span id="totalClientes">0</span><p>Clientes</p></div>
          <div class="card"><span id="totalOrcamentos">R$ 0,00</span><p>Valor em negociação</p></div>
          <div class="card"><span id="totalFechados">0</span><p>Fechados</p></div>
          <div class="card"><span id="totalPerdidos">0</span><p>Perdidos</p></div>
        </div>
        <h2>Resumo por vendedor</h2>
        <div id="ranking"></div>
      </section>

      <section id="clientes" class="page hidden">
        <h1>Clientes</h1>
        <div class="form">
          <input id="nome" placeholder="Nome do cliente"/>
          <input id="telefone" placeholder="WhatsApp com DDD"/>
          <input id="origem" placeholder="Origem: Instagram, loja, arquiteto..."/>
          <input id="produto" placeholder="Produto de interesse"/>
          <input id="valor" type="number" placeholder="Valor estimado"/>
          <select id="vendedor"></select>
          <select id="status">
            <option>Novo lead</option>
            <option>Em atendimento</option>
            <option>Orçamento enviado</option>
            <option>Negociação</option>
            <option>Pedido fechado</option>
            <option>Perdido</option>
            <option>Pós-venda</option>
          </select>
          <textarea id="obs" placeholder="Observações"></textarea>
          <button onclick="salvarCliente()">Salvar cliente</button>
        </div>
        <div id="listaClientes"></div>
      </section>

      <section id="funil" class="page hidden">
        <h1>Funil de Vendas</h1>
        <div id="kanban" class="kanban"></div>
      </section>

      <section id="vendedores" class="page hidden">
        <h1>Vendedores</h1>
        <div class="form-row">
          <input id="novoVendedor" placeholder="Nome do vendedor"/>
          <button onclick="adicionarVendedor()">Adicionar</button>
        </div>
        <div id="listaVendedores"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
